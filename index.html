<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لا يمكنك الدخول للغرفة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="overlay"></div>

    <div class="login-container">
        <h2>لا يمكنك الدخول للغرفة</h2>
        <p class="subtitle">...إلا إذا كان معك مفتاح الدخول!</p>
        <form id="loginForm">
            <div class="input-group">
                <label for="inviteKey">مفتاح الدخول أو كلمة المرور:</label>
                <input type="password" id="inviteKey" required autofocus>
            </div>
            <button type="submit">ادخل الغرفة</button>
            <p id="errorMessage" class="error-message">مفتاح الدخول غير صحيح. يرجى التأكد والمحاولة مرة أخرى.</p>
            <p id="successMessage" class="success-message">تم الدخول بنجاح! جاري التوجيه...</p>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
