<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>غرفة الدردشة الخاصة بالأصدقاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-wrapper">
        <div class="chat-header">
            <button class="profile-settings-button" title="إعدادات الملف الشخصي">
                <span>&#8942;</span> 
            </button>
            <h2>مساحة أصدقاء البرمجة</h2>
            <p>أهلاً بك في غرفتك الخاصة!</p>
        </div>
        <div class="chat-messages" id="chatMessages">
            </div>
        <div class="chat-input-area">
            <button id="sendMessage" title="إرسال الرسالة">
                <svg viewBox="0 0 24 24" fill="currentColor" class="send-icon">
                    <path d="M3.4 20.4l17.45-7.49c.44-.19.73-.64.73-1.13s-.29-.94-.73-1.13L3.4 3.6c-.41-.18-.88-.19-1.28.02-.4.21-.63.63-.59 1.08L2.83 11H12v2H2.83l-1.3 6.3c-.04.45.19.87.59 1.08.4.21.87.2 1.28-.02z"/>
                </svg>
            </button>
            <div class="input-actions">
                <label for="imageUpload" title="إرسال صورة" class="action-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
                </label>
                <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                
                <label for="fileUpload" title="إرسال ملف" class="action-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.04 2.46 5.5 5.5 5.5s5.5-2.46 5.5-5.5V6h-1.5z"/></svg>
                </label>
                <input type="file" id="fileUpload" style="display: none;">
            </div>
            <div class="input-container">
                <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا..." dir="rtl">
            </div>
        </div>
    </div>

    <div class="profile-modal" id="profileModal">
        <div class="profile-modal-content">
            <span class="close-button" title="إغلاق">&times;</span>
            <h3>ملف المستخدم</h3>
            <div class="profile-image-container">
                <img src="default-profile.png" alt="صورة الملف الشخصي" id="profileImageDisplay" width="80" height="80">
                <label for="profileImageUpload" class="upload-profile-image-button">تغيير الصورة</label>
                <input type="file" id="profileImageUpload" accept="image/*" style="display: none;">
            </div>
            <div class="profile-info">
                <label for="userName">اسم المستخدم:</label>
                <input type="text" id="userName" placeholder="أدخل اسمك">
            </div>
            <div class="profile-info">
                <label for="userHandle">اسم المستخدم (يوزر):</label>
                <input type="text" id="userHandle" placeholder="اختر يوزر فريد">
            </div>
            <div class="profile-info">
                <label for="userId">ID الخاص بك:</label>
                <input type="text" id="userId" value="0000" readonly>
                <button type="button" id="generateNewId">تغيير ID</button>
            </div>
            <button type="button" id="saveProfileInfo">حفظ المعلومات</button>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="chat.js"></script>
</body>
</html>
